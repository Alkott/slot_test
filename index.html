<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Slot POC</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #1a1a2e; }
    canvas { display: block; position: fixed; top: 0; left: 0; width: 100%; height: 100%; }
    #controls {
      position: fixed;
      bottom: max(20px, env(safe-area-inset-bottom));
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      gap: 12px;
      z-index: 10;
    }
    #controls button {
      padding: 13px 24px;
      background: rgba(0, 0, 0, 0.7);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    #controls button:disabled { opacity: 0.4; cursor: default; }
  </style>
</head>
<body>
  <div id="controls">
    <button id="btn-add">Add Reel</button>
    <button id="btn-remove">Remove Reel</button>
    <button id="btn-spin">Spin</button>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
